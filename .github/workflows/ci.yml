# ============================================================================
# GitHub Actions CI Pipeline — Campus RSO Platform
# ============================================================================
# Triggers on push to main branch
# Builds Docker images for all microservices and pushes to GHCR
# ============================================================================

name: CI — Build & Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/rso

jobs:
  # --------------------------------------------------------------------------
  # Build Frontend
  # --------------------------------------------------------------------------
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -w frontend

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}

  # --------------------------------------------------------------------------
  # Build Backend Services (matrix strategy)
  # --------------------------------------------------------------------------
  build-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - tenant-service
          - user-service
          - resource-service
          - booking-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.service }}
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}

  # --------------------------------------------------------------------------
  # Update Kubernetes manifests with new image tags
  # --------------------------------------------------------------------------
  update-manifests:
    name: Update K8s Manifests
    needs: [build-frontend, build-services]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in Kustomization
        run: |
          cd k8s/overlays/production
          sed -i "s|newTag:.*|newTag: ${{ github.sha }}|g" kustomization.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/production/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
