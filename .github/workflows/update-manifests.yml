name: Update K8s Manifests

on:
  # Backend/Frontend CI pipeline complete වුණාම trigger වෙනවා
  workflow_run:
    workflows: ["Backend CI Pipeline", "Frontend CI Pipeline"]
    types: [completed]
    branches: [main]

jobs:
  update-manifests:
    # CI pipeline success වුණොත් පමණක් run කරනවා (fail = skip)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Git push කිරීමට

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Update image tags in K8s manifests
        run: |
          # Short SHA generate කරමු (commit ID එකේ මුල් characters 7)
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "📦 Updating manifests with image tag: $SHORT_SHA"
          
          # Owner name lowercase කරමු (GHCR requirement)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          # k8s/base/ folder එකේ සියලු .yml files වල image tag update කරමු
          # sed command එක:
          # ghcr.io/owner/service-name:OLD_TAG → ghcr.io/owner/service-name:NEW_SHA
          for manifest in k8s/base/*.yml; do
            if [ -f "$manifest" ]; then
              sed -i "s|ghcr.io/${OWNER}/\([^:]*\):[^ ]*|ghcr.io/${OWNER}/\1:${SHORT_SHA}|g" "$manifest"
              echo "  ✅ Updated: $manifest"
            fi
          done

      - name: 📝 Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # k8s/ folder එකේ changes තියෙනවද check කරමු
          if git diff --quiet k8s/; then
            echo "ℹ️ No manifest changes detected, skipping commit"
            exit 0
          fi
          
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          git add k8s/
          git commit -m "🚀 chore: update image tags to ${SHORT_SHA} [skip ci]"
          git push
          
          echo "## ✅ K8s Manifests Updated" >> $GITHUB_STEP_SUMMARY
          echo "- **New Image Tag:** ${SHORT_SHA}" >> $GITHUB_STEP_SUMMARY