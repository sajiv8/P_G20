# Frontend Nginx Configuration
# SPA (Single Page Application) support සඳහා — 
# සියලුම routes index.html එකට redirect කරනවා

server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Gzip compression enable කරමු (page load speed වැඩි කිරීමට)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
    
    # SPA routing support
    # /booking, /admin වැනි routes browser refresh කළ විට 
    # 404 වෙන්නේ නැතුව index.html serve කරනවා
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Static assets cache කරමු (performance වැඩි කිරීමට)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Health check endpoint (K8s probes සඳහා)
    location /health {
        access_log off;
        return 200 '{"status":"healthy","service":"frontend"}';
        add_header Content-Type application/json;
    }
}