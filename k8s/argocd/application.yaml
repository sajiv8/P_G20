# ============================================================================
# ArgoCD Application — RSO Platform
# ============================================================================
# This defines the ArgoCD Application resource that watches the GitHub repo
# and auto-syncs Kubernetes manifests from the production overlay.
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rso-platform
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/isuru709/RSO.git
    targetRevision: main
    path: k8s/overlays/production

  destination:
    server: https://kubernetes.default.svc
    namespace: rso

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
