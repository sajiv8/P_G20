# ============================================================================
# Gateway ConfigMap — Nginx Configuration
# ============================================================================
# This ConfigMap is managed by ArgoCD/Kustomize so the gateway nginx.conf
# is automatically updated when changes are pushed to the repo.
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-conf
  namespace: rso
data:
  nginx.conf: |
    # ============================================================================
    # API Gateway — Nginx Configuration
    # Multi-Tenant Campus Resource Sharing Platform
    # ============================================================================
    events {
        worker_connections 1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        # Logging
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;

        # Performance
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;

        # Gzip
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml application/json application/javascript
                   application/rss+xml application/atom+xml image/svg+xml;

        # Rate Limiting
        limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
        limit_req_zone $binary_remote_addr zone=api_booking_write:10m rate=5r/s;
        limit_req_zone $binary_remote_addr zone=api_auth:10m rate=3r/s;

        # Upstreams
        upstream tenant-service {
            server tenant-service:3001;
            keepalive 16;
        }
        upstream user-service {
            server user-service:3002;
            keepalive 16;
        }
        upstream resource-service {
            server resource-service:3003;
            keepalive 16;
        }
        upstream booking-service {
            server booking-service:3004;
            keepalive 16;
        }
        upstream notification-service {
            server notification-service:3005;
            keepalive 16;
        }
        upstream frontend {
            server frontend:80;
            keepalive 16;
        }

        # HTTP Server
        server {
            listen 80;
            server_name pro.isuruhub.site localhost;

            location /health {
                access_log off;
                return 200 '{"status":"ok","gateway":"nginx"}\n';
                add_header Content-Type application/json;
            }

            location /api/v1/tenants {
                limit_req zone=api_general burst=20 nodelay;
                proxy_pass http://tenant-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
            }

            location /api/v1/users/signup {
                limit_req zone=api_auth burst=5 nodelay;
                proxy_pass http://user-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
            }

            location /api/v1/users {
                limit_req zone=api_general burst=20 nodelay;
                proxy_pass http://user-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
                client_max_body_size 10M;
            }

            location /uploads/ {
                alias /uploads/;
                expires 30d;
                add_header Cache-Control "public, immutable";
            }

            location /api/v1/resources {
                limit_req zone=api_general burst=20 nodelay;
                proxy_pass http://resource-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
            }

            location /api/v1/st-resources {
                limit_req zone=api_general burst=20 nodelay;
                proxy_pass http://resource-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
            }

            location /api/v1/bookings {
                limit_req zone=api_booking_write burst=10 nodelay;
                proxy_pass http://booking-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
            }

            location /api/v1/notifications {
                limit_req zone=api_general burst=20 nodelay;
                proxy_pass http://notification-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
            }

            location /api/ {
                return 404 '{"success":false,"error":{"code":"NOT_FOUND","message":"API endpoint not found"}}\n';
                add_header Content-Type application/json always;
            }

            location / {
                proxy_pass http://frontend;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }

        # HTTPS Server
        server {
            listen 443 ssl http2;
            server_name pro.isuruhub.site localhost;

            ssl_certificate /etc/nginx/ssl/origin.pem;
            ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

            ssl_session_timeout 1d;
            ssl_session_cache shared:SSL:50m;
            ssl_session_tickets off;
            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
            ssl_prefer_server_ciphers off;

            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;

            client_max_body_size 10M;

            location = /health {
                access_log off;
                return 200 '{"status":"ok","gateway":"nginx"}\n';
                add_header Content-Type application/json;
            }

            location /api/v1/tenants {
                limit_req zone=api_general burst=20 nodelay;
                proxy_pass http://tenant-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
                proxy_connect_timeout 10s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
            }

            location /api/v1/users/signup {
                limit_req zone=api_auth burst=5 nodelay;
                proxy_pass http://user-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
                proxy_connect_timeout 10s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
            }

            location /api/v1/users {
                limit_req zone=api_general burst=20 nodelay;
                proxy_pass http://user-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
                proxy_connect_timeout 10s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
                client_max_body_size 10M;
            }

            location /uploads/ {
                alias /uploads/;
                expires 30d;
                add_header Cache-Control "public, immutable";
            }

            location /api/v1/resources {
                limit_req zone=api_general burst=20 nodelay;
                proxy_pass http://resource-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
                proxy_connect_timeout 10s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
            }

            location /api/v1/st-resources {
                limit_req zone=api_general burst=20 nodelay;
                proxy_pass http://resource-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
                proxy_connect_timeout 10s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
            }

            location /api/v1/bookings {
                limit_req zone=api_booking_write burst=10 nodelay;
                proxy_pass http://booking-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
                proxy_connect_timeout 10s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
            }

            location /api/v1/notifications {
                limit_req zone=api_general burst=20 nodelay;
                proxy_pass http://notification-service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
                proxy_connect_timeout 10s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
            }

            location /api/ {
                return 404 '{"success":false,"error":{"code":"NOT_FOUND","message":"API endpoint not found"}}\n';
                add_header Content-Type application/json always;
            }

            location / {
                proxy_pass http://frontend;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }
