---
# ============================================================================
# Uploads PVC (shared by user-service)
# ============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: rso
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
